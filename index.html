<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Memo</title>
<meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Memo">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e0ddd8;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b68;
    --text-placeholder: #b0aea8;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --btn-clear-bg: #ffffff;
    --btn-clear-border: #d0cdc8;
    --btn-clear-hover: #f0ede8;
    --btn-clear-text: #444442;
    --error: #dc2626;
    --success: #16a34a;
    --disabled-bg: #e8e6e1;
    --disabled-text: #a0a09a;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #252523;
      --border: #3a3a38;
      --text-primary: #f0eee8;
      --text-secondary: #a0a09a;
      --text-placeholder: #606060;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --btn-clear-bg: #2e2e2c;
      --btn-clear-border: #4a4a48;
      --btn-clear-hover: #3a3a38;
      --btn-clear-text: #d0cec8;
      --error: #f87171;
      --success: #4ade80;
      --disabled-bg: #2e2e2c;
      --disabled-text: #606060;
      --shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 64px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 28px 24px;
    width: 100%;
    max-width: 560px;
  }

  .header {
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .header .date {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 3px;
  }

  textarea {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    padding: 14px 16px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-primary);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  textarea::placeholder {
    color: var(--text-placeholder);
    font-size: 14px;
  }
  textarea:focus {
    border-color: var(--accent);
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }

  button {
    padding: 9px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s, color 0.15s;
    white-space: nowrap;
    -webkit-appearance: none;
  }

  #btn-submit {
    background: var(--accent);
    color: #fff;
  }
  #btn-submit:hover:not(:disabled) {
    background: var(--accent-hover);
  }
  #btn-submit:disabled {
    background: var(--disabled-bg);
    color: var(--disabled-text);
    cursor: default;
  }

  #btn-clear {
    background: var(--btn-clear-bg);
    color: var(--btn-clear-text);
    border: 1px solid var(--btn-clear-border);
  }
  #btn-clear:hover:not(:disabled) {
    background: var(--btn-clear-hover);
  }
  #btn-clear:disabled {
    background: var(--disabled-bg);
    color: var(--disabled-text);
    border-color: transparent;
    cursor: default;
  }

  #system-msg {
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.6;
    min-height: 20px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #system-msg.success { color: var(--success); }
  #system-msg.error   { color: var(--error); }

  @media (max-width: 400px) {
    body { padding: 24px 12px 48px; }
    .card { padding: 20px 16px; border-radius: 12px; }
    textarea { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Daily Memo</h1>
    <div class="date" id="today-date"></div>
  </div>

  <textarea
    id="memo-input"
    placeholder="今日の出来事、気付き、メモなど...(Ctrl+Enterで投稿)"
  ></textarea>

  <div class="btn-row">
    <button id="btn-submit" disabled>投稿する</button>
    <button id="btn-clear" disabled>クリア</button>
  </div>

  <div id="system-msg"></div>
</div>

<script>
  // ============================================================
  // 設定: デプロイ後にCloudflare WorkerのURLに変更してください
  // ============================================================
  const WORKER_URL = "https://mu-diary.mute-develop.workers.dev";
  // ============================================================

  const textarea   = document.getElementById("memo-input");
  const btnSubmit  = document.getElementById("btn-submit");
  const btnClear   = document.getElementById("btn-clear");
  const systemMsg  = document.getElementById("system-msg");
  const todayDate  = document.getElementById("today-date");

  function pad(n) { return String(n).padStart(2, "0"); }

  function getDateStr(d) {
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
  }

  function getNowStr() {
    const d = new Date();
    return `${getDateStr(d)} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  todayDate.textContent = getDateStr(new Date());

  function updateButtons() {
    const hasText = textarea.value.trim().length > 0;
    btnSubmit.disabled = !hasText;
    btnClear.disabled  = !hasText;
  }

  function clearMsg() {
    systemMsg.textContent = "";
    systemMsg.className = "";
  }

  function showMsg(text, type) {
    systemMsg.textContent = text;
    systemMsg.className = type;
  }

  textarea.addEventListener("input", updateButtons);

  textarea.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      if (!btnSubmit.disabled) btnSubmit.click();
    }
  });

  btnClear.addEventListener("click", () => {
    textarea.value = "";
    updateButtons();
  });

  btnSubmit.addEventListener("click", async () => {
    const text = textarea.value.trim();
    if (!text) return;

    btnSubmit.textContent = "処理中";
    btnSubmit.disabled = true;
    btnClear.disabled  = true;
    clearMsg();

    const timestamp = getNowStr();

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, timestamp }),
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        throw new Error(data.error || `HTTP ${res.status}`);
      }

      showMsg("投稿に成功しました。", "success");
      textarea.value = "";
      updateButtons();
    } catch (err) {
      showMsg(`投稿に失敗しました。\n${err.message}`, "error");
      btnClear.disabled = textarea.value.trim().length === 0;
    } finally {
      btnSubmit.textContent = "投稿する";
      btnSubmit.disabled = textarea.value.trim().length === 0;
    }
  });
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js");
    });
  }
</script>
</body>
</html>
